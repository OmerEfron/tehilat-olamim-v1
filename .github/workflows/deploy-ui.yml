name: Deploy UI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "shared/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.*"
      - "tsconfig.json"
      - "postcss.config.*"
      - ".github/workflows/deploy-ui.yml"
  workflow_dispatch:

concurrency:
  group: deploy-ui
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build static export
        env:
          NEXT_PUBLIC_WS_URL: ${{ vars.NEXT_PUBLIC_WS_URL }}
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=tehilat-olamim --branch=main
